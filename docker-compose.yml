version: '3.8'

services:
  smart-travel-planner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart-travel-planner
    restart: unless-stopped
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - PYTHONPATH=/app
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./cache:/app/cache
      - ./data:/app/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import src.smart_travel_planner; print('OK')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - travel-planner-network

  redis:
    image: redis:7-alpine
    container_name: travel-planner-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - travel-planner-network

  nginx:
    image: nginx:alpine
    container_name: travel-planner-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - smart-travel-planner
    networks:
      - travel-planner-network

volumes:
  redis_data:
    driver: local

networks:
  travel-planner-network:
    driver: bridge
